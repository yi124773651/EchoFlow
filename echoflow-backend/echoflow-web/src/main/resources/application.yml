server:
  port: 8080

spring:
  application:
    name: echoflow

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/echoflow}
    username: ${DB_USERNAME:echoflow}
    password: ${DB_PASSWORD:echoflow}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      base-url: ${AI_BASE_URL:https://api.openai.com}
      api-key: ${AI_API_KEY:sk-no-key-set}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o-mini}

echoflow:
  ai:
    connect-timeout: 10s
    read-timeout: 60s
  github:
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
    connect-timeout: 5s
    read-timeout: 10s
    max-results: 5
  webhook:
    url: ${WEBHOOK_URL:}
    connect-timeout: 5s
    read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
